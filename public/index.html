function callNumber(phone){

        return;
    }
    window.location.href = "tel:" + phone;
}

function callAmbulance(){
    window.location.href = "tel:108";
}

function shareLocation(){

    if(!navigator.geolocation){

        toast("Location not supported on this device","er");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            var mapsURL =
                "https://www.google.com/maps?q=" + lat + "," + lon;

            navigator.clipboard.writeText(mapsURL);

            window.open(mapsURL,"_blank");

            toast("Live location opened successfully 📍","ok");

        },

        function(error){

            if(error.code === 1){

                toast("Location permission blocked. Enable it from browser settings.","er");

            } 
            else if(error.code === 2){

                toast("Location unavailable. Try again.","er");

            } 
            else if(error.code === 3){

                toast("Location request timed out.","er");

            }

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );
}

async function sendSOSAlert(){

  const user = JSON.parse(localStorage.getItem("LOGGED_USER"));

  if(!user){
    toast("Please login first","er");
    return;
  }

  navigator.geolocation.getCurrentPosition(async function(position){

    await fetch(
      "https://care24.onrender.com/api/sos/trigger",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
  userId: user.name,
  latitude: position.coords.latitude,
  longitude: position.coords.longitude
})
      }
    );

    toast("SOS alert triggered successfully!","ok");

  });

}
async function addEmergencyContact(){

  const user = JSON.parse(localStorage.getItem("LOGGED_USER"));

  if(!user){
    alert("Please login first");

  }

  const name = prompt("Enter contact name:");

    "https://care24.onrender.com/api/sos/add-contact",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId: user._id,
        name,
        relation,
        phone
      })
    }
  );

  const data = await res.json();

  console.log(data);

  loadEmergencyContacts();
}

function showAuth(m,r){

}
function renderAuth(){

    var isL = S.am === 'login';

    var h = '<div class="p-8">';

    h += '<div class="flex items-center justify-between mb-6">';
    h += '<h2 class="font-display text-2xl font-black text-chr">'

    h += '<i class="fa-solid fa-xmark"></i></button></div>';

    h += '<button onclick="S.am=\'login\';renderAuth()" class="flex-1 py-2.5 rounded-lg font-black text-sm transition-all '
        + (isL ? 'bg-white shadow text-pri' : 'text-gray-500')
        + '">Log In</button>';

    h += '<button onclick="S.am=\'register\';renderAuth()" class="flex-1 py-2.5 rounded-lg font-black text-sm transition-all '

    if(!isL){

        h += '<div>';
        h += '<label class="fl">Full Name</label>';
        h += '<input type="text" id="a-nm" class="fi" placeholder="Enter your name" required>';
        h += '</div>';

    }

    /* EMAIL FIELD (NO AUTO-FILL) */

    h += '<div>';
    h += '<label class="fl">Email Address</label>';
    h += '<input type="email" id="a-em" class="fi" placeholder="you@example.com" value="" required>';
    h += '</div>';

    /* PASSWORD FIELD (NO AUTO-FILL) */

    h += '<div>';
    h += '<label class="fl">Password</label>';
    h += '<input type="password" id="a-pw" class="fi" placeholder="Enter password" value="" required>';
    h += '</div>';

    /* ROLE SELECTION (REGISTER ONLY) */

    if(!isL){

        h += '<div>';

                + (roles[i] === S.ar ? 'checked' : '')

            h += '<div class="text-center py-2.5 rounded-xl border-2 border-gray-200 font-bold text-sm text-gray-500 '
                + 'peer-checked:border-pri peer-checked:bg-pri-50 peer-checked:text-pri transition-all" '
                + 'style="text-transform:capitalize">'
                + roles[i] +
                '</div>';

            h += '</label>';

        }

        h += '</div>';
        h += '</div>';
    }

    /* SUBMIT BUTTON */

    h += '<button type="submit" class="bp w-full justify-center py-3.5 text-lg">'
        + (isL ? 'Log In' : 'Create Account')
        + '</button>';

    h += '</form>';

    h += '</div>';

    showModal(h);
}
function handleAuth(e){

    e.preventDefault();

    var em = $('#a-em').value.trim(),
        pw = $('#a-pw').value;

    /* LOGIN */

    if(S.am === 'login'){

        var u = USRS.find(function(x){
            return x.em === em && x.pw === pw;
        });

        if(u){

            S.user = u;

            /* SAVE LOGIN SESSION */
            localStorage.setItem("LOGGED_USER", JSON.stringify(u));

            closeMod();
            nav(u.rl);

            toast('Welcome back, ' + u.name + '!', 'ok');

        } 
        else{

            toast('Invalid email or password.', 'er');

        }

    } 
    
    /* REGISTER */

    else{

        var nm = $('#a-nm').value.trim();

        var rlEl = document.querySelector('input[name="a-rl"]:checked');

        var rl = rlEl ? rlEl.value : 'user';

        var nu = {
            id: 'u' + Date.now(),
            name: nm,
            em: em,
            pw: pw,
            rl: rl
        };

        /* ADD USER */
        USRS.push(nu);

        /* ✅ STEP 2 ADDED HERE */
        localStorage.setItem("USRS", JSON.stringify(USRS));

        /* CREATE PATIENT PROFILE IF USER */

        if(rl === 'user'){

            PTS.push({
                id: 'p' + Date.now(),
                uid: nu.id,
                name: '',
                age: '',
                g: 'Male',
                cd: '',
                ad: '',
                ph: ''
            });

            localStorage.setItem("PTS", JSON.stringify(PTS));
        }

        /* AUTO LOGIN AFTER REGISTER */

        S.user = nu;

        localStorage.setItem("LOGGED_USER", JSON.stringify(nu));

        closeMod();

        nav(rl);

        toast('Account created!', 'ok');

    }
}

function buildSub(role){
    if(role==='user'){
        if(S.sub==='overview') return uOverview();
        if(S.sub==='services') return uServices();
        if(S.sub==='booking') return uBooking();
        if(S.sub==='tracking') return uTracking();
        if(S.sub==='history') return uHistory();
        if(S.sub==='patient') return uPatient();
    }
    if(role==='caregiver'){
        var cg=gid(S.user.cid);
        if(S.sub==='overview') return cgOverview(cg);
        if(S.sub==='requests') return cgRequests(cg);
        if(S.sub==='availability') return cgAvail(cg);
        if(S.sub==='notes') return cgNotes(cg);
        if(S.sub==='earnings') return cgEarnings(cg);
    }
    if(role==='admin'){
        if(S.sub==='overview') return adAnalytics();
        if(S.sub==='caregivers') return adCaregivers();
        if(S.sub==='users') return adUsers();
        if(S.sub==='complaints') return adComplaints();
        if(S.sub==='services-mgmt') return adServices();
    }
    return '';
}

    var h='<button onclick="S.bs=0;render()" class="text-pri font-bold text-sm mb-4 inline-flex items-center gap-1 hover:underline"><i class="fa-solid fa-arrow-left"></i> Back</button>';
    h+='<h3 class="font-display text-xl font-black text-chr mb-1">Choose a Caregiver</h3>';
    var svcName=sid(S.selSvc)?sid(S.selSvc).name:'Service';
    h+='<p class="text-gray-500 text-sm mb-5">'+svcName+' — '+cgs.length+' available</p>';

    if(cgs.length===0){
        h+='<p class="text-gray-400 text-center py-8">No available caregivers for this service right now.</p>';
        return h;
    }
    h+='<div class="grid sm:grid-cols-2 gap-4">';
    for(var i=0;i<cgs.length;i++){
        var c=cgs[i];
        var pk=S.selCg===c.id?'pk':'';
        h+='<div class="cgs '+pk+'" onclick="S.selCg=\''+c.id+'\';render()">';
        h+='<div class="flex items-start gap-3 mb-3">';
        h+=avImg(c);
        h+='<div class="flex-1 min-w-0"><p class="font-black text-chr" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.name+'</p><p class="text-pri text-xs font-bold">'+c.role+' &middot; '+c.exp+' yrs</p></div>';
        h+='<div class="flex-shrink-0">'+sh(c.rt)+'</div></div>';
        h+='<p class="text-gray-500 text-sm mb-3" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+c.bio+'</p>';
        h+='<div class="flex items-center justify-between text-sm"><span class="text-gray-400"><i class="fa-solid fa-location-dot mr-1"></i>'+c.areas.split(',')[0]+'</span><span class="font-black text-chr">'+fp(c.pr)+'/hr</span></div>';

function bkStep2(){
    var cg=gid(S.selCg), svc=sid(S.selSvc);
    var today=new Date().toISOString().split('T')[0];
    var dfv=S.bf.date||today;
    var tmv=S.bf.time||'09:00';

    var h='<button onclick="S.bs=1;render()" class="text-pri font-bold text-sm mb-4 inline-flex items-center gap-1 hover:underline"><i class="fa-solid fa-arrow-left"></i> Back</button>';
    h+='<h3 class="font-display text-xl font-black text-chr mb-5">Schedule Your Service</h3>';
    h+='<div class="flex items-center gap-4 p-4 bg-crm rounded-xl mb-6">';
    h+=avImg(cg);
    h+='<div><p class="font-black text-chr">'+cg.name+'</p><p class="text-gray-500 text-sm">'+svc.name+' &middot; '+fp(cg.pr)+'/hr</p></div></div>';

    var pat=pid(S.user.id);
    h+='<div class="grid sm:grid-cols-2 gap-5 mb-5">';
    h+='<div><label class="fl">Patient Name</label><input type="text" id="bk-pt" class="fi" value="'+(pat&&pat.name?pat.name:'')+'" placeholder="Patient name" required></div>';
    h+='<div><label class="fl">Date</label><input type="date" id="bk-dt" class="fi" min="'+today+'" value="'+dfv+'"></div>';
    h+='<div><label class="fl">Time</label><input type="time" id="bk-tm" class="fi" value="'+tmv+'"></div>';
    h+='<div><label class="fl">Duration</label><select id="bk-dur" class="fi">';
    var durs=[['hourly','Hourly (1-4 hours)'],['half-day','Half Day (8 hours)'],['daily','Full Day (12 hours)'],['long-term','Long Term (Monthly)']];
    for(var i=0;i<durs.length;i++){
        h+='<option value="'+durs[i][0]+'" '+(S.bf.dur===durs[i][0]?'selected':'')+'>'+durs[i][1]+'</option>';
    }

    h+='<div class="mb-6"><label class="fl">Special Notes / Medical Conditions</label><textarea id="bk-nt" class="fi" rows="3" placeholder="Any specific medical needs, allergies, or instructions...">'+S.bf.notes+'</textarea></div>';
    h+='<div class="flex justify-end gap-3"><button onclick="S.bs=1;render()" class="bo">Back</button><button onclick="saveBkForm()" class="bp">Review <i class="fa-solid fa-arrow-right"></i></button></div>';
    return h;

function saveBkForm(){
    var dt=$('#bk-dt'), tm=$('#bk-tm'), dur=$('#bk-dur'), nt=$('#bk-nt');
    S.bf.date=dt?dt.value:'';
    S.bf.time=tm?tm.value:'';
    S.bf.dur=dur?dur.value:'hourly';
    S.bf.notes=nt?nt.value:'';
    S.bs=3; render();
}

function bkStep3(){
    var cg=gid(S.selCg), svc=sid(S.selSvc);
    var dL={hourly:'Hourly','half-day':'Half Day',daily:'Full Day','long-term':'Long Term'};
    var dP={hourly:cg.pr*4,'half-day':cg.pr*8,daily:cg.pr*12,'long-term':cg.pr*12*30};
    var dName=dL[S.bf.dur]||'Hourly';
    var dCost=dP[S.bf.dur]||cg.pr*4;
    var dtDisp=fd(S.bf.date||new Date().toISOString().split('T')[0]);

    var h='<button onclick="S.bs=2;render()" class="text-pri font-bold text-sm mb-4 inline-flex items-center gap-1 hover:underline"><i class="fa-solid fa-arrow-left"></i> Back</button>';
    h+='<h3 class="font-display text-xl font-black text-chr mb-6">Confirm Your Booking</h3>';
    h+='<div class="space-y-4 mb-6">';
    h+='<div class="flex items-center gap-4 p-5 bg-crm rounded-2xl">';
    h+='<div class="av av-l" style="padding:0"><img src="'+cg.img+'" alt=""></div>';
    h+='<div><p class="font-black text-chr text-lg">'+cg.name+'</p><p class="text-pri font-bold">'+cg.role+' &middot; '+cg.qual+'</p><p class="mt-1">'+sh(cg.rt)+' <span class="text-gray-400 text-xs">('+cg.rv+' reviews)</span></p></div></div>';
    h+='<div class="grid sm:grid-cols-2 gap-4">';
    h+='<div class="p-4 bg-crm rounded-xl"><p class="text-gray-400 text-xs font-bold mb-1">Service</p><p class="font-black text-chr">'+svc.name+'</p></div>';
    h+='<div class="p-4 bg-crm rounded-xl"><p class="text-gray-400 text-xs font-bold mb-1">Date & Time</p><p class="font-black text-chr">'+dtDisp+' at '+(S.bf.time||'09:00')+'</p></div>';
    h+='<div class="p-4 bg-crm rounded-xl"><p class="text-gray-400 text-xs font-bold mb-1">Duration</p><p class="font-black text-chr">'+dName+'</p></div>';
    h+='<div class="p-4 bg-crm rounded-xl"><p class="text-gray-400 text-xs font-bold mb-1">Estimated Cost</p><p class="font-black text-pri text-xl">'+fp(dCost)+'</p></div>';
    h+='</div></div>';
    h+='<div class="flex justify-end gap-3"><button onclick="S.bs=2;render()" class="bo">Edit</button><button onclick="confirmBk()" class="bs text-lg px-8" style="box-shadow:0 8px 24px rgba(232,115,74,.3)"><i class="fa-solid fa-check-circle"></i> Confirm Booking</button></div>';
    return h;
}

function confirmBk(){
    var ptEl=$('#bk-pt');
    var ptName=ptEl?ptEl.value:'Patient';
    var dt=S.bf.date||new Date().toISOString().split('T')[0];
    BKS.push({
    id:'b'+Date.now().toString(36),
    uid:S.user.id,
    cid:S.selCg,
    sid:S.selSvc,
    pn:ptName,
    st:'requested',
    dt:dt,
    tm:S.bf.time || '09:00',
    dur:S.bf.dur,
    nt:S.bf.notes,
    ca:new Date().toISOString().split('T')[0]
});

/* STEP 4: SAVE BOOKING TO LOCAL STORAGE */
localStorage.setItem("BKS", JSON.stringify(BKS));
    S.bs=0; S.selSvc=null; S.selCg=null; S.bf={date:'',time:'',dur:'hourly',notes:''};
    toast('Booking request sent!','ok');
    S.sub='tracking'; render();
}

/* ===== USER: TRACKING ===== */
function uTracking(){
    var active=BKS.filter(function(b){return b.uid===S.user.id&&!['completed','rejected','cancelled'].indexOf(b.st)>=0});
    if(!active.length) return '<div class="dc text-center py-16"><i class="fa-solid fa-location-crosshairs text-6xl text-gray-200 mb-5"></i><h3 class="font-display text-2xl font-black text-chr mb-2">No Active Services</h3><p class="text-gray-400 mb-6">You have no active bookings to track.</p><button onclick="S.sub=\'booking\';S.bs=0;render()" class="bp">Book a Service</button></div>';

    var stages=['requested','accepted','in-progress','completed'];
    var h='';
    for(var a=0;a<active.length;a++){
        var b=active[a], cg=gid(b.cid), svc=sid(b.sid);
        var ci=stages.indexOf(b.st);
        var notes=NOTES.filter(function(n){return n.bid===b.id}).sort(function(x,y){return y.tm.localeCompare(x.tm)});

        h+='<div class="dc mb-6"><div class="flex flex-wrap items-start gap-4 mb-6">';
        if(cg) h+=avImg(cg);
        h+='<div class="flex-1 min-w-0"><div class="flex flex-wrap items-center gap-3 mb-1"><h3 class="font-display text-xl font-black text-chr">'+(svc?svc.name:'Service')+'</h3><span class="bdg '+sc(b.st)+'">'+sl(b.st)+'</span></div>';
        h+='<p class="text-gray-500 text-sm">'+(cg?cg.name:'N/A')+' &middot; '+b.pn+' &middot; '+fd(b.dt)+' at '+b.tm+'</p></div></div>';

        h+='<div class="flex items-center justify-between mb-3">';
        for(var si=0;si<stages.length;si++){
            var dcls=si<ci?'bg-green-500 text-white shadow-lg':si===ci?'bg-pri text-white':'bg-gray-200 text-gray-400';
            h+='<div class="flex flex-col items-center flex-1"><div class="w-11 h-11 rounded-full flex items-center justify-center text-sm font-black '+dcls+'" style="'+(si===ci?'animation:pulseRing 2s infinite':'')+'">'+(si<ci?'<i class="fa-solid fa-check"></i>':(si+1))+'</div>';
            h+='<span class="text-[10px] mt-1.5 font-bold '+(si<=ci?'text-chr':'text-gray-400')+' text-center">'+sl(stages[si])+'</span></div>';
        }
        h+='</div><div class="pt mt-3 mb-6"><div class="pf bg-gradient-to-r from-pri to-pri-light" style="width:'+((ci/3)*100)+'%"></div></div>';

        if(notes.length){
            h+='<h4 class="font-black text-chr text-sm mb-3"><i class="fa-solid fa-notes-medical text-pri mr-2"></i>Care Notes</h4><div class="space-y-3">';
            for(var ni=0;ni<notes.length;ni++){
                var n=notes[ni];
                h+='<div class="p-4 bg-crm rounded-xl" style="border-left:4px solid #0A6E72"><div class="flex items-center justify-between mb-1"><span class="text-xs font-black text-pri">'+n.dt+' at '+n.tm+'</span><span class="text-xs text-gray-400">'+(cg?cg.name:'')+'</span></div><p class="text-sm text-gray-600 leading-relaxed">'+n.nt+'</p></div>';
            }
            h+='</div>';
        }
        h+='</div>';
    }
    return h;
}

function savePat(e){
    e.preventDefault();
    var d={name:$('#pt-nm').value,age:$('#pt-ag').value,g:$('#pt-gn').value,cd:$('#pt-cd').value,ad:$('#pt-ad').value,ph:$('#pt-ph').value};
    var p=pid(S.user.id);
    if(p){p.name=d.name;p.age=d.age;p.g=d.g;p.cd=d.cd;p.ad=d.ad;p.ph=d.ph}
    else PTS.push({id:'p'+Date.now(),uid:S.user.id,name:d.name,age:d.age,g:d.g,cd:d.cd,ad:d.ad,ph:d.ph});
    toast('Patient profile saved!','ok'); render();
}

/* ===== CAREGIVER: OVERVIEW ===== */
function cgOverview(cg){
    if(!cg) return '<p class="text-gray-400">Profile not found.</p>';
    var my=BKS.filter(function(b){return b.cid===cg.id});
    var pend=my.filter(function(b){return b.st==='requested'}).length;
    var act=my.filter(function(b){return b.st==='accepted'||b.st==='in-progress'}).length;
    var done=my.filter(function(b){return b.st==='completed'}).length;
    var earn=done*cg.pr*8;

    var h='<div class="mb-8 flex items-center gap-5">'+avImg(cg)+'<div><h2 class="font-display text-2xl font-black text-chr">Hello, '+cg.name.split(' ')[0]+'</h2><p class="text-gray-500">'+cg.role+' &middot; '+sh(cg.rt)+' <span class="text-gray-400 text-xs">('+cg.rv+' reviews)</span></p></div></div>';
    h+='<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">';
    var sts=[{n:pend,l:'Pending',bg:'#E8734A'},{n:act,l:'Active',bg:'#0A6E72'},{n:done,l:'Completed',bg:'#059669'},{n:fp(earn),l:'Earnings',bg:'#D4A017'}];
    for(var i=0;i<sts.length;i++){
        h+='<div class="dc sc"><div class="sbg" style="background:'+sts[i].bg+'"></div><p class="text-3xl font-black text-chr">'+sts[i].n+'</p><p class="text-gray-500 text-sm font-bold">'+sts[i].l+'</p></div>';
    }
    h+='</div>';

    h+='<div class="grid lg:grid-cols-3 gap-6"><div class="lg:col-span-2 dc"><h3 class="font-display text-lg font-black text-chr mb-4">Recent Activity</h3>';
    if(my.length===0) h+='<p class="text-gray-400 text-center py-8">No bookings yet.</p>';
    else for(var j=0;j<Math.min(5,my.length);j++){
        var b=my[j], svc=sid(b.sid);
        h+='<div class="flex items-center gap-4 py-3 border-b border-gray-100 last:border-0"><div class="w-10 h-10 rounded-xl bg-crm flex items-center justify-center"><i class="fa-solid '+(svc?svc.icon:'fa-heart-pulse')+' text-pri"></i></div>';
        h+='<div class="flex-1"><p class="font-bold text-chr text-sm">'+b.pn+' — '+(svc?svc.name:'')+'</p><p class="text-gray-400 text-xs">'+fd(b.dt)+' &middot; '+b.tm+'</p></div>';
        h+='<span class="bdg '+sc(b.st)+'">'+sl(b.st)+'</span></div>';
    }
    h+='</div><div class="dc"><h3 class="font-display text-lg font-black text-chr mb-4">Profile Info</h3><div class="space-y-2.5 text-sm">';
    var infos=[['Qualification',cg.qual],['Experience',cg.exp+' years'],['Areas',cg.areas],['Rate',fp(cg.pr)+'/hr'],['Status',cg.ver?'<span class="bdg b-ok">Verified</span>':'<span class="bdg b-w">Pending</span>']];
    for(var k=0;k<infos.length;k++){
        h+='<div class="flex justify-between py-2 border-b border-gray-100"><span class="text-gray-400">'+infos[k][0]+'</span><span class="font-bold text-right text-xs">'+infos[k][1]+'</span></div>';
    }
    h+='</div></div></div>';
    return h;
}

/* ===== CAREGIVER: REQUESTS ===== */
function cgRequests(cg){
    if(!cg) return '';

    var my = BKS
        .filter(function(b){ return b.cid === cg.id })
        .sort(function(a,b){ return b.ca.localeCompare(a.ca) });

    if(!my.length){
        return `
        <div class="dc text-center py-16">
            <i class="fa-solid fa-inbox text-6xl text-gray-200 mb-5"></i>
            <h3 class="font-display text-xl font-black text-chr mb-2">
                No Requests
            </h3>
        </div>`;
    }

    var h = '<div class="space-y-4">';

    for(var i=0;i<my.length;i++){

        var b = my[i],
            svc = sid(b.sid),
            usr = uid(b.uid);

        h += `
        <div class="dc">
            <div class="flex flex-wrap items-start gap-4 mb-4">

                <div class="w-12 h-12 rounded-xl bg-crm flex items-center justify-center">
                    <i class="fa-solid ${svc?svc.icon:'fa-heart-pulse'} text-pri text-xl"></i>
                </div>

                <div class="flex-1 min-w-0">

                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <h3 class="font-black text-chr">${svc?svc.name:''}</h3>
                        <span class="bdg ${sc(b.st)}">${sl(b.st)}</span>
                    </div>

                    <p class="text-gray-500 text-sm">
                        Patient: ${b.pn} · ${usr?usr.name:'User'} · ${fd(b.dt)} at ${b.tm}
                    </p>

                    ${b.nt ? `
                    <p class="text-gray-400 text-xs mt-1">
                        <i class="fa-solid fa-note-sticky mr-1"></i>${b.nt}
                    </p>` : ''}

                </div>
            </div>
        `;

        /* STATUS BUTTONS */

        if(b.st === 'requested'){

            h += `
            <div class="flex gap-3">

                <button onclick="upBkSt('${b.id}','accepted')" 
                class="bp bsm">
                    <i class="fa-solid fa-check"></i> Accept
                </button>

                <button onclick="upBkSt('${b.id}','rejected')" 
                class="bo bsm border-red-300 text-red-500 hover:bg-red-500 hover:text-white">
                    <i class="fa-solid fa-xmark"></i> Reject
                </button>

            </div>`;

        }

        else if(b.st === 'accepted'){

            h += `
            <button onclick="upBkSt('${b.id}','in-progress')" 
            class="bp bsm">
                <i class="fa-solid fa-play"></i> Start Service
            </button>`;

        }

        else if(b.st === 'in-progress'){

            h += `
            <button onclick="upBkSt('${b.id}','completed')" 
            class="bs bsm">
                <i class="fa-solid fa-flag-checkered"></i> Complete
            </button>`;

        }

        else{

            h += `
            <p class="text-gray-400 text-sm font-bold">
                Booking ${b.st}.
            </p>`;

        }

        h += `</div>`;
    }

    return h + '</div>';
}
function upBkSt(id, st){

    var b = BKS.find(function(x){
        return x.id === id;
    });

    if(!b) return;

    /* UPDATE BOOKING STATUS */
    b.st = st;

    /* ✅ STEP 3 ADDED HERE (SAVE BOOKING STATUS) */
    localStorage.setItem("BKS", JSON.stringify(BKS));


    /* CREATE ACTIVITY LOG FOR ADMIN */
    if(typeof ACTIVITY_LOG !== "undefined"){

        ACTIVITY_LOG.push({
            bookingId: id,
            caregiverId: S.user.id,
            caregiverName: S.user.name,
            action: st,
            time: new Date().toLocaleString()
        });

        /* ✅ SAVE ACTIVITY LOG ALSO */
        localStorage.setItem("ACTIVITY_LOG", JSON.stringify(ACTIVITY_LOG));
    }


    /* SHOW STATUS MESSAGE */
    toast(
        "Booking " + sl(st).toLowerCase() + ".",
        st === "rejected" ? "er" : "ok"
    );


    /* REFRESH DASHBOARD */
    render();
}
/* ===== CAREGIVER: AVAILABILITY ===== */
function cgAvail(cg){
    if(!cg) return '';
    var onClr=cg.avl?'bg-pri':'bg-gray-300';
    var dotClr=cg.avl?'right-1':'left-1';
    var h='<div class="dc max-w-lg"><h3 class="font-display text-xl font-black text-chr mb-6">Manage Availability</h3>';
    h+='<div class="flex items-center justify-between p-5 bg-crm rounded-2xl mb-6"><div><p class="font-black text-chr">Available for Bookings</p><p class="text-gray-400 text-sm">Toggle to accept or pause requests</p></div>';
    h+='<button onclick="togAvail()" class="w-14 h-8 rounded-full transition-all relative '+onClr+'"><div class="w-6 h-6 rounded-full bg-white shadow absolute top-1 transition-all '+dotClr+'"></div></button></div>';
    h+='<div class="mb-5"><label class="fl">Service Areas</label><input type="text" class="fi" value="'+cg.areas+'" onchange="gid(\''+cg.id+'\').areas=this.value"></div>';
    h+='<div class="mb-5"><label class="fl">Hourly Rate</label><input type="number" class="fi" value="'+cg.pr+'" onchange="gid(\''+cg.id+'\').pr=parseInt(this.value)"></div>';
    h+='<button onclick="toast(\'Availability updated!\',\'ok\')" class="bp"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button></div>';
    return h;
}
function togAvail(){
    var cg=gid(S.user.cid);
    if(cg){cg.avl=!cg.avl; toast(cg.avl?'You are now available.':'You are now unavailable.','in'); render();}
}

/* ===== CAREGIVER: NOTES ===== */
function cgNotes(cg){
    if(!cg) return '';
    var ab=BKS.filter(function(b){return b.cid===cg.id&&(b.st==='in-progress'||b.st==='accepted')});
    var an=NOTES.filter(function(n){return n.cid===cg.id}).sort(function(a,b){return(b.dt+b.tm).localeCompare(a.dt+a.tm)});

    var h='<div class="grid lg:grid-cols-3 gap-6"><div class="dc"><h3 class="font-display text-lg font-black text-chr mb-4">Add Care Note</h3>';
    if(!ab.length) h+='<p class="text-gray-400 text-sm">No active bookings.</p>';
    else {
        h+='<form onsubmit="addNote(event)" class="space-y-4"><div><label class="fl">Booking</label><select id="nt-bk" class="fi">';
        for(var i=0;i<ab.length;i++) h+='<option value="'+ab[i].id+'">'+ab[i].pn+' — '+fd(ab[i].dt)+'</option>';
        h+='</select></div><div><label class="fl">Note</label><textarea id="nt-txt" class="fi" rows="4" placeholder="Vitals, observations, care provided..." required></textarea></div>';
        h+='<button type="submit" class="bp w-full justify-center"><i class="fa-solid fa-plus"></i> Add Note</button></form>';
    }
    h+='</div><div class="lg:col-span-2 dc"><h3 class="font-display text-lg font-black text-chr mb-4">All Notes</h3>';
    if(!an.length) h+='<p class="text-gray-400 text-center py-8">No notes yet.</p>';
    else {
        h+='<div class="space-y-3">';
        for(var j=0;j<an.length;j++){
            var n=an[j], b=BKS.find(function(x){return x.id===n.bid});
            h+='<div class="p-4 bg-crm rounded-xl" style="border-left:4px solid #0A6E72"><div class="flex items-center justify-between mb-2"><span class="text-xs font-black text-pri">'+n.dt+' at '+n.tm+'</span><span class="text-xs text-gray-400">'+(b?b.pn:'Patient')+'</span></div><p class="text-sm text-gray-600 leading-relaxed">'+n.nt+'</p></div>';
        }
        h+='</div>';
    }
    h+='</div></div>';
    return h;
}
function addNote(e){
    e.preventDefault();
    var bk=$('#nt-bk').value, txt=$('#nt-txt').value, now=new Date();
    NOTES.push({id:'n'+Date.now(),bid:bk,cid:S.user.cid,dt:now.toISOString().split('T')[0],nt:txt,tm:now.toTimeString().slice(0,5)});
    $('#nt-txt').value=''; toast('Care note added!','ok'); render();
}

/* ===== CAREGIVER: EARNINGS ===== */
function cgEarnings(cg){
    if(!cg) return '';
    var done=BKS.filter(function(b){return b.cid===cg.id&&b.st==='completed'});
    var total=0, mo={};
    for(var i=0;i<done.length;i++){
        var amt=cg.pr*8; total+=amt;
        var m=done[i].dt.slice(0,7); mo[m]=(mo[m]||0)+amt;
    }
    var avg=done.length?fp(Math.round(total/done.length)):'\u20B90';
    var h='<div class="grid sm:grid-cols-3 gap-5 mb-8">';
    h+='<div class="dc sc"><div class="sbg" style="background:#D4A017"></div><p class="text-sm text-gray-500 font-bold mb-1">Total Earnings</p><p class="text-3xl font-black text-chr">'+fp(total)+'</p></div>';
    h+='<div class="dc sc"><div class="sbg" style="background:#059669"></div><p class="text-sm text-gray-500 font-bold mb-1">Completed</p><p class="text-3xl font-black text-chr">'+done.length+'</p></div>';
    h+='<div class="dc sc"><div class="sbg" style="background:#0A6E72"></div><p class="text-sm text-gray-500 font-bold mb-1">Avg per Service</p><p class="text-3xl font-black text-chr">'+avg+'</p></div>';
    h+='</div><div class="dc"><h3 class="font-display text-lg font-black text-chr mb-5">Monthly Breakdown</h3>';

    var keys=Object.keys(mo).sort(function(a,b){return b.localeCompare(a)});
    if(!keys.length) h+='<p class="text-gray-400 text-center py-8">No earnings data yet.</p>';
    else {
        var mx=Math.max.apply(null,keys.map(function(k){return mo[k]}));
        h+='<div class="space-y-4">';
        for(var j=0;j<keys.length;j++){
            var pct=Math.round((mo[keys[j]]/mx)*100);
            h+='<div class="flex items-center gap-4"><span class="text-sm font-bold text-gray-500 w-24">'+keys[j]+'</span><div class="flex-1 pt"><div class="pf" style="background:linear-gradient(90deg,#D4A017,#EDBE3E);width:'+pct+'%"></div></div><span class="font-black text-chr w-28 text-right">'+fp(mo[keys[j]])+'</span></div>';
        }
        h+='</div>';
    }
    h+='</div>';
    return h;
}

/* ===== ADMIN: ANALYTICS ===== */
function adAnalytics(){
    var tu=USRS.filter(function(u){return u.rl==='user'}).length;
    var tv=CGS.filter(function(c){return c.ver}).length;
    var td=BKS.filter(function(b){return b.st==='completed'}).length;
    var rate=BKS.length?Math.round((td/BKS.length)*100):0;

    var h='<div class="mb-8"><h2 class="font-display text-2xl font-black text-chr mb-1">Analytics Dashboard</h2><p class="text-gray-500">Platform performance overview.</p></div>';
    h+='<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">';
    var sts=[{n:tu,l:'Registered Users',bg:'#0A6E72'},{n:CGS.length,l:tv+' Verified Caregivers',bg:'#E8734A'},{n:BKS.length,l:'Total Bookings',bg:'#D4A017'},{n:rate+'%',l:'Completion Rate',bg:'#059669'}];
    for(var i=0;i<sts.length;i++){
        h+='<div class="dc sc"><div class="sbg" style="background:'+sts[i].bg+'"></div><p class="text-3xl font-black text-chr">'+sts[i].n+'</p><p class="text-gray-500 text-sm font-bold">'+sts[i].l+'</p></div>';
    }
    h+='</div>';
    h+='<div class="grid lg:grid-cols-2 gap-6 mb-6"><div class="dc"><h3 class="font-display text-lg font-black text-chr mb-4">Bookings Over Time</h3><canvas id="ch-bk" height="220"></canvas></div>';
    h+='<div class="dc"><h3 class="font-display text-lg font-black text-chr mb-4">Service Distribution</h3><canvas id="ch-sv" height="220"></canvas></div></div>';
    h+='<div class="dc"><h3 class="font-display text-lg font-black text-chr mb-4">Caregiver Ratings</h3><canvas id="ch-rt" height="160"></canvas></div>';
    return h;
}
function initCharts(){
    var co={responsive:true,plugins:{legend:{labels:{font:{family:'Nunito',weight:'700'}}}}};
    var c1=document.getElementById('ch-bk');
    if(c1) new Chart(c1,{type:'line',data:{labels:['Oct','Nov','Dec','Jan'],datasets:[{label:'Bookings',data:[28,45,62,BKS.length*20],borderColor:'#0A6E72',backgroundColor:'rgba(10,110,114,.1)',fill:true,tension:.4,pointBackgroundColor:'#0A6E72',pointRadius:6}]},options:{...co,scales:{y:{beginAtZero:true,grid:{color:'#f0ebe3'}},x:{grid:{display:false}}}}});
    var c2=document.getElementById('ch-sv');
    if(c2) new Chart(c2,{type:'doughnut',data:{labels:SVCS.map(function(s){return s.name}),datasets:[{data:[35,28,20,17],backgroundColor:['#0A6E72','#E8734A','#D4A017','#059669'],borderWidth:0,hoverOffset:10}]},options:{...co,cutout:'68%'}});
    var c3=document.getElementById('ch-rt');
    if(c3) new Chart(c3,{type:'bar',data:{labels:CGS.map(function(c){return c.name.split(' ')[0]}),datasets:[{label:'Rating',data:CGS.map(function(c){return c.rt}),backgroundColor:CGS.map(function(c){return c.clr+'88'}),borderColor:CGS.map(function(c){return c.clr}),borderWidth:2,borderRadius:10,barThickness:32}]},options:{...co,scales:{y:{min:3.5,max:5,grid:{color:'#f0ebe3'}},x:{grid:{display:false}}}}});
}

/* ===== ADMIN: CAREGIVERS ===== */
function adCaregivers(){
    var pend=CGS.filter(function(c){return !c.ver});
    var list=S.at==='pending'?pend:CGS;
    var h='<div class="mb-6 flex items-center justify-between flex-wrap gap-4"><h2 class="font-display text-2xl font-black text-chr">Caregiver Management</h2>';
    h+='<div class="flex gap-2 bg-crm rounded-xl p-1"><button onclick="S.at=\'all\';render()" class="tb '+(S.at==='all'?'on':'')+'">All ('+CGS.length+')</button>';
    h+='<button onclick="S.at=\'pending\';render()" class="tb '+(S.at==='pending'?'on':'')+'">Pending ('+pend.length+')</button></div></div>';
    if(!list.length) return h+'<div class="dc text-center py-12"><p class="text-gray-400">No caregivers here.</p></div>';

    h+='<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">';
    for(var i=0;i<list.length;i++){
        var c=list[i];
        h+='<div class="dc clift"><div class="flex items-start gap-3 mb-4">';
        h+=avImg(c);
        h+='<div class="flex-1 min-w-0"><p class="font-black text-chr" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.name+'</p><p class="text-pri text-sm font-bold">'+c.role+'</p><p class="mt-0.5">'+sh(c.rt)+'</p></div>';
        h+='<span class="bdg '+(c.ver?'b-ok':'b-w')+' flex-shrink-0">'+(c.ver?'Verified':'Pending')+'</span></div>';
        h+='<div class="space-y-1.5 text-sm mb-4">';
        var inf=[['Exp',c.exp+' yrs'],['Qual',c.qual],['Areas',c.areas],['Rate',fp(c.pr)+'/hr']];
        for(var j=0;j<inf.length;j++) h+='<div class="flex justify-between"><span class="text-gray-400">'+inf[j][0]+'</span><span class="font-bold text-right text-xs">'+inf[j][1]+'</span></div>';
        h+='</div>';
        if(!c.ver) h+='<div class="flex gap-2"><button onclick="verCg(\''+c.id+'\',true)" class="bp bxs flex-1 justify-center"><i class="fa-solid fa-check"></i> Verify</button><button onclick="verCg(\''+c.id+'\',false)" class="bo bxs flex-1 justify-center border-red-300 text-red-500 hover:bg-red-500 hover:text-white"><i class="fa-solid fa-xmark"></i> Reject</button></div>';
        else h+='<button onclick="verCg(\''+c.id+'\',false)" class="bo bxs w-full justify-center border-red-300 text-red-500 hover:bg-red-500 hover:text-white"><i class="fa-solid fa-ban"></i> Revoke</button>';
        h+='</div>';
    }
    h+='</div>';
    return h;
}
function verCg(id,v){
    var c=gid(id);
    if(c){c.ver=v; toast(v?c.name+' verified!':c.name+' revoked.',v?'ok':'er'); render();}
}

/* ===== ADMIN: USERS ===== */
function adUsers(){
    var us=USRS.filter(function(u){return u.rl==='user'});
    var h='<h2 class="font-display text-2xl font-black text-chr mb-6">User Management</h2>';
    h+='<div class="dc overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b-2 border-gray-100">';
    ['User','Email','Phone','Bookings','Patient'].forEach(function(th){h+='<th class="text-left py-3 px-4 font-black text-gray-400 text-xs uppercase tracking-wider">'+th+'</th>'});
    h+='</tr></thead><tbody>';
    for(var i=0;i<us.length;i++){
        var u=us[i], bc=BKS.filter(function(b){return b.uid===u.id}).length, p=pid(u.id);
        h+='<tr class="border-b border-gray-50 hover:bg-crm/50"><td class="py-3.5 px-4 font-bold text-chr">'+u.name+'</td>';
        h+='<td class="py-3.5 px-4 text-gray-500">'+u.em+'</td><td class="py-3.5 px-4 text-gray-500">'+(u.ph||'-')+'</td>';
        h+='<td class="py-3.5 px-4"><span class="bdg b-i">'+bc+'</span></td><td class="py-3.5 px-4 text-gray-500">'+(p?p.name:'No profile')+'</td></tr>';
    }
    h+='</tbody></table></div>';
    return h;
}

/* ===== ADMIN: COMPLAINTS ===== */
function adComplaints(){
    if(!CMPS.length) return '<h2 class="font-display text-2xl font-black text-chr mb-6">Complaints</h2><div class="dc text-center py-12"><p class="text-gray-400">No complaints.</p></div>';
    var h='<h2 class="font-display text-2xl font-black text-chr mb-6">Complaints & Disputes</h2><div class="space-y-4">';
    for(var i=0;i<CMPS.length;i++){
        var c=CMPS[i], from=uid(c.fr), about=gid(c.ab);
        h+='<div class="dc"><div class="flex flex-wrap items-start justify-between gap-3 mb-3"><div class="flex items-center gap-3"><div class="av av-sm bg-red-500"><i class="fa-solid fa-triangle-exclamation text-[10px]"></i></div>';
        h+='<div><p class="font-black text-chr text-sm">'+(from?from.name:'User')+' <span class="font-normal text-gray-400">about</span> '+(about?about.name:'Caregiver')+'</p><p class="text-gray-400 text-xs">'+fd(c.dt)+'</p></div></div>';
        h+='<span class="bdg '+(c.st==='open'?'b-e':'b-ok')+'">'+(c.st==='open'?'Open':'Resolved')+'</span></div>';
        h+='<p class="text-gray-600 text-sm mb-4 pl-11">"'+c.msg+'"</p>';
        if(c.st==='open') h+='<div class="flex gap-2 pl-11"><button onclick="resCmp(\''+c.id+'\')" class="bp bxs"><i class="fa-solid fa-check"></i> Resolve</button><button onclick="escCmp()" class="bo bxs"><i class="fa-solid fa-arrow-up"></i> Escalate</button></div>';
        h+='</div>';
    }
    return h+'</div>';
}
function resCmp(id){
    var c=CMPS.find(function(x){return x.id===id});
    if(c){c.st='resolved'; toast('Complaint resolved.','ok'); render();}
}
function escCmp(){
    showModal('<div class="p-6"><h3 class="font-display text-xl font-black text-chr mb-4">Escalate Complaint</h3><div class="mb-4"><label class="fl">Escalation Notes</label><textarea id="esc-nt" class="fi" rows="3" placeholder="Describe the action taken..."></textarea></div><div class="flex gap-3 justify-end"><button onclick="closeMod()" class="bo bsm">Cancel</button><button onclick="closeMod();toast(\'Complaint escalated.\',\'in\')" class="bp bsm"><i class="fa-solid fa-arrow-up"></i> Escalate</button></div></div>');
}

/* ===== ADMIN: SERVICES ===== */
function adServices(){
    var h='<h2 class="font-display text-2xl font-black text-chr mb-6">Service Categories</h2><div class="grid md:grid-cols-2 gap-5">';
    for(var i=0;i<SVCS.length;i++){
        var s=SVCS[i];
        h+='<div class="dc clift flex gap-5"><div class="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0" style="background:'+s.clr+'12"><i class="fa-solid '+s.icon+' text-2xl" style="color:'+s.clr+'"></i></div>';
        h+='<div class="flex-1"><h3 class="font-black text-chr mb-1">'+s.name+'</h3><p class="text-gray-500 text-xs mb-2">'+s.desc+'</p>';
        h+='<div class="flex flex-wrap gap-3 text-xs text-gray-400"><span><i class="fa-solid fa-indian-rupee-sign mr-1"></i>'+fp(s.pr)+'/hr</span><span><i class="fa-regular fa-clock mr-1"></i>'+s.dur+'</span><span><i class="fa-solid fa-graduation-cap mr-1"></i>'+s.qual+'</span></div></div></div>';
    }

}

/* ===== EMERGENCY SOS ===== */

  // 🔹 Load contacts from MongoDB before rendering modal
  await loadEmergencyContacts();

  var pat = pid(S.user ? S.user.id : '');

  h += '<div style="position:relative;z-index:1">';

      h += '<div class="w-9 h-9 rounded-full bg-red-100 flex items-center justify-center mb-2">';

      h += '<p class="font-black text-chr text-sm">'+ec.name+'</p>';
      h += '<p class="text-red-600 text-xs font-bold">'+ec.relation+'</p>';
      h += '<p class="text-gray-400 text-xs mt-1">'+ec.phone+'</p>';

      h += '</button>';
  }

  h += '</div>';

  /* QUICK ACTIONS */

  h += '<h3 class="font-black text-chr text-sm uppercase tracking-wider flex items-center gap-2 mt-6 mb-4">';
  h += '<i class="fa-solid fa-bolt text-acc"></i> Quick Actions</h3>';

  h += '<div class="grid grid-cols-2 gap-3">';

  h += '<button onclick="callAmbulance()" class="p-4 bg-red-500 text-white rounded-xl text-center hover:bg-red-600 transition-colors">';
  h += '<i class="fa-solid fa-truck-medical text-xl mb-1"></i>';
  h += '<p class="font-black text-sm">Call Ambulance</p>';
  h += '<p class="text-red-200 text-xs">108</p></button>';

  h += '<button onclick="shareLocation()" class="p-4 bg-pri text-white rounded-xl text-center hover:bg-pri-dark transition-colors">';
  h += '<i class="fa-solid fa-location-crosshairs text-xl mb-1"></i>';
  h += '<p class="font-black text-sm">Share Location</p>';
  h += '<p class="text-white/70 text-xs">Google Maps</p></button>';

  h += '</div>';

  /* MEDICAL INFO */

  h += '<h3 class="font-black text-chr text-sm uppercase tracking-wider flex items-center gap-2 mt-6 mb-4">';
  h += '<i class="fa-solid fa-file-medical text-pri"></i> Medical Information</h3>';

  h += '<div class="bg-crm rounded-xl p-4 space-y-2 text-sm">';

      h += '<div class="flex justify-between"><span class="text-gray-400">Patient</span><span class="font-bold">'+pat.name+'</span></div>';
      h += '<div class="flex justify-between"><span class="text-gray-400">Age</span><span class="font-bold">'+(pat.age||"N/A")+'</span></div>';
